---
apiVersion: "v1"
kind: "List"
metadata:
  resourceVersion: ""
  selfLink: ""
items:
  - apiVersion: "apps/v1"
    kind: "StatefulSet"
    metadata:
      annotations:
      name: "etcd"
      namespace: "etcd"
    spec:
      podManagementPolicy: "Parallel"
      replicas: 4
      revisionHistoryLimit: 10
      selector:
        matchLabels:
          app: "etcd"
      serviceName: "etcd"
      template:
        metadata:
          annotations:
            serviceName: "etcd"
          labels:
            app: "etcd"
        spec:
          containers:
            - args:
                - "--name=$(HOSTNAME)"
                - "--data-dir=/data"
                - "--wal-dir=/data/wal"
                - "--listen-peer-urls=$(URI_SCHEME)://0.0.0.0:2380"
                - "--listen-client-urls=$(URI_SCHEME)://0.0.0.0:2379"
                - "--advertise-client-urls=$(URI_SCHEME)://$(HOSTNAME).$(SERVICE_NAME):2379"
                - "--initial-cluster-state=new"
                - "--initial-cluster-token=etcd-$(K8S_NAMESPACE)"
                - "--initial-cluster=etcd-0=$(URI_SCHEME)://etcd-0.$(SERVICE_NAME):2380,etcd-1=$(URI_SCHEME)://etcd-1.$(SERVICE_NAME):2380,etcd-2=$(URI_SCHEME)://etcd-2.$(SERVICE_NAME):2380"
                - "--initial-advertise-peer-urls=$(URI_SCHEME)://$(HOSTNAME).$(SERVICE_NAME):2380"
                - "--listen-metrics-urls=http://0.0.0.0:8080"
              command: ["/usr/local/bin/etcd"]
              env:
                - name: "K8S_NAMESPACE"
                  valueFrom:
                    fieldRef:
                      apiVersion: "v1"
                      fieldPath: "metadata.namespace"
                - name: "HOSTNAME"
                  valueFrom:
                    fieldRef:
                      apiVersion: "v1"
                      fieldPath: "metadata.name"
                - name: "SERVICE_NAME"
                  valueFrom:
                    fieldRef:
                      apiVersion: "v1"
                      fieldPath: "metadata.annotations['serviceName']"
                - name: "ETCDCTL_ENDPOINTS"
                  value: "$(HOSTNAME).$(SERVICE_NAME):2379"
                - name: "URI_SCHEME"
                  value: "http"
              image: "quay.io/coreos/etcd:v3.6.0"
              imagePullPolicy: "IfNotPresent"
              livenessProbe:
                failureThreshold: 3
                httpGet:
                  path: "/livez"
                  port: 8080
                  scheme: "HTTP"
                initialDelaySeconds: 15
                periodSeconds: 10
                successThreshold: 1
                timeoutSeconds: 5
              name: "etcd"
              ports:
                - containerPort: 2379
                  name: "etcd-client"
                  protocol: "TCP"
                - containerPort: 2380
                  name: "etcd-server"
                  protocol: "TCP"
                - containerPort: 8080
                  name: "etcd-metrics"
                  protocol: "TCP"
              readinessProbe:
                failureThreshold: 30
                httpGet:
                  path: "/readyz"
                  port: 8080
                  scheme: "HTTP"
                initialDelaySeconds: 10
                periodSeconds: 5
                successThreshold: 1
                timeoutSeconds: 5
              resources: {}
              terminationMessagePath: "/dev/termination-log"
              terminationMessagePolicy: "File"
              volumeMounts:
                - mountPath: "/data"
                  name: "etcd-data"
          dnsPolicy: "ClusterFirst"
          restartPolicy: "Always"
          schedulerName: "default-scheduler"
          securityContext: {}
          terminationGracePeriodSeconds: 30
      updateStrategy:
        type: "RollingUpdate"
      volumeClaimTemplates:
        - apiVersion: "v1"
          kind: "PersistentVolumeClaim"
          metadata:
            creationTimestamp: null
            name: "etcd-data"
          spec:
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: "1Gi"
            volumeMode: "Filesystem"
          status:
            phase: "Pending"
