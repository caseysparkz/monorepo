# Author:       Casey Sparks
# Date:         November 15, 2023
# Description:  Run dagger ansible checks.
---
name: "ansible"
on:
  pull_request:
    branches: ["main"]
    paths: ["ansible/**/*.yml"]
    types:
      - "opened"
      - "ready_for_review"
      - "reopened"
      - "synchronize"
jobs:
  dagger_check_ansible:
    name: "dagger"
    runs-on: "ubuntu-latest"
    permissions:
      contents: "read"
      id-token: "write"
    steps:
      - name: "dagger check python:*"
        uses: "./.github/actions/dagger-check"
        with:
          check: "ansible:*"
