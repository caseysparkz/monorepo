---
version: 2
updates:
  - package-ecosystem: "github-actions"
    directories:
      - ".github/workflows"
      - ".github/actions"
    target-branch: "main"
    rebase-strategy: "auto"
    schedule:
      interval: "weekly"
      day: "friday"
      time: "16:45"
      timezone: "America/Los_Angeles"
    commit-message:
      prefix: "chore(github-actions)"

  - package-ecosystem: "npm"
    directory: "./"
    target-branch: "main"
    rebase-strategy: "auto"
    versioning-strategy: "increase"
    schedule:
      interval: "weekly"
      day: "friday"
      time: "16:45"
      timezone: "America/Los_Angeles"
    commit-message:
      prefix: "chore(node-npm)"

  - package-ecosystem: "terraform"
    directory: "./infra/"
    target-branch: "main"
    rebase-strategy: "auto"
    schedule:
      interval: "weekly"
      day: "friday"
      time: "16:45"
      timezone: "America/Los_Angeles"
    commit-message:
      prefix: "chore(terraform)"

  - package-ecosystem: "pip"
    directory: "./"
    target-branch: "main"
    rebase-strategy: "auto"
    versioning-strategy: "increase"
    schedule:
      interval: "weekly"
      day: "friday"
      time: "16:45"
      timezone: "America/Los_Angeles"
    commit-message:
      prefix: "chore(python-pip)"
