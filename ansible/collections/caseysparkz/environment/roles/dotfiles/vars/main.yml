---
dotfiles_subdirectories:
  - path: "{{ ansible_facts.env.HOME }}/.config/Yubico"
    mode: "0700"
dotfiles_symlinks: # src relative to role path /files dir
  - src: "config/Yubico/u2f_keys"
    dest: "{{ ansible_facts.env.HOME }}/.config/Yubico/u2f_keys"

  - src: "config/i3"
    dest: "{{ ansible_facts.env.HOME }}/.config/i3"
